name: pharmacy_app
description: سیستم مدیریت داروخانه
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '^3.11.0'  # ✅ اضافه کن این خط

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.0
  flutter_localizations:
    sdk: flutter

  flutter_bloc: ^8.1.0
  bloc: ^8.1.0
  get_it: ^7.6.0
  sqflite: ^2.3.0
  path: ^1.8.3
  equatable: ^2.0.5
  dartz: ^0.10.1
  intl: ^0.20.2
  intl_phone_number_input: ^0.7.2
  mask_text_input_formatter: ^2.5.0
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.2
  easy_localization: ^3.0.2
  shared_preferences: ^2.2.2
  logger: ^2.0.0
  flutter_staggered_animations: ^1.1.1
  uuid: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  bloc_test: ^9.1.0
  mocktail: ^1.0.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/logos/
    - assets/images/icons/
    - assets/images/illustrations/
    - assets/translations/
    - assets/data/


generate: true